name: Build Windows Print Agent

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag. Leave blank to upload artifacts only."
        required: false
        type: string
        default: ""
  push:
    paths:
      - "ops/local_print_agent/**"
      - ".github/workflows/build-windows-print-agent.yml"
  pull_request:
    paths:
      - "ops/local_print_agent/**"
      - ".github/workflows/build-windows-print-agent.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build executable and zip
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build FW-ERP-Print-Agent.exe
        shell: pwsh
        working-directory: ops/local_print_agent
        run: |
          powershell -ExecutionPolicy Bypass -File .\build_windows_exe.ps1

      - name: Package fw-erp-print-agent-windows.zip
        shell: pwsh
        working-directory: ops/local_print_agent
        run: |
          powershell -ExecutionPolicy Bypass -File .\package_windows_agent.ps1

      - name: Verify build artifacts
        shell: pwsh
        run: |
          $ExePath = "ops/local_print_agent/FW-ERP-Print-Agent.exe"
          $ZipPath = "ops/local_print_agent/fw-erp-print-agent-windows.zip"
          if (!(Test-Path $ExePath)) {
            throw "Missing build artifact: $ExePath"
          }
          if (!(Test-Path $ZipPath)) {
            throw "Missing build artifact: $ZipPath"
          }

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: FW-ERP-Print-Agent.exe
          path: ops/local_print_agent/FW-ERP-Print-Agent.exe
          if-no-files-found: error

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: fw-erp-print-agent-windows.zip
          path: ops/local_print_agent/fw-erp-print-agent-windows.zip
          if-no-files-found: error

      - name: Publish optional GitHub Release asset
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Windows Print Agent ${{ inputs.release_tag }}
          files: |
            ops/local_print_agent/FW-ERP-Print-Agent.exe
            ops/local_print_agent/fw-erp-print-agent-windows.zip
