<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hardware Label Lab</title>
    <style>
      :root {
        --bg: #f3ecdf;
        --panel: rgba(255, 255, 255, 0.94);
        --panel-strong: #ffffff;
        --border: rgba(19, 73, 87, 0.16);
        --border-strong: rgba(19, 73, 87, 0.34);
        --text: #15303a;
        --muted: #66767d;
        --accent: #1a687b;
        --accent-soft: rgba(26, 104, 123, 0.08);
        --accent-strong: #173843;
        --success: #2d9360;
        --success-soft: rgba(45, 147, 96, 0.12);
        --shadow: 0 18px 52px rgba(14, 46, 57, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "SF Pro Display", "Helvetica Neue", "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 32%),
          linear-gradient(180deg, #f8f4ec 0%, #f0e7da 100%);
      }

      #hardwareLabelLab {
        width: min(1500px, calc(100vw - 28px));
        margin: 18px auto 40px;
      }

      .page-shell {
        display: grid;
        gap: 24px;
      }

      .hero {
        padding: 28px 30px;
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .hero-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 16px 0 10px;
        font-size: clamp(34px, 5vw, 60px);
        line-height: 1.02;
        letter-spacing: -0.05em;
      }

      .hero p {
        max-width: 1040px;
        margin: 0;
        font-size: 18px;
        line-height: 1.72;
        color: var(--muted);
      }

      .hero-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 22px;
      }

      .hero-strip div {
        padding: 16px 18px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid var(--border);
      }

      .hero-strip span {
        display: block;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .hero-strip strong {
        display: block;
        margin-top: 6px;
        font-size: 28px;
        letter-spacing: -0.04em;
      }

      .lab-toolbar {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .toolbar-field {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid var(--border);
      }

      .toolbar-field label {
        display: block;
        margin-bottom: 8px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .toolbar-field input {
        width: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-weight: 700;
        outline: none;
      }

      .auth-strip {
        display: grid;
        gap: 12px;
        margin-top: 16px;
        padding: 16px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid var(--border);
      }

      .auth-actions,
      .section-actions,
      .candidate-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .auth-meta,
      .lab-status {
        color: var(--muted);
        line-height: 1.65;
        font-size: 14px;
      }

      .lab-status[data-tone="success"] {
        color: var(--success);
        font-weight: 700;
      }

      .lab-status[data-tone="danger"] {
        color: #b43d32;
        font-weight: 700;
      }

      button {
        appearance: none;
        border: 1px solid rgba(19, 73, 87, 0.16);
        background: rgba(255, 255, 255, 0.96);
        color: var(--text);
        border-radius: 999px;
        font: inherit;
        font-weight: 800;
        padding: 12px 18px;
        cursor: pointer;
        transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, color 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        border-color: var(--border-strong);
      }

      .sections {
        display: grid;
        gap: 26px;
      }

      .group-section,
      .report-section {
        padding: 24px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--border);
        box-shadow: 0 12px 34px rgba(17, 52, 63, 0.08);
      }

      .group-head {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(300px, 0.9fr);
        gap: 18px;
        align-items: start;
      }

      .group-kicker {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .group-head h2,
      .report-section h2 {
        margin: 6px 0 0;
        font-size: clamp(26px, 3vw, 38px);
        letter-spacing: -0.04em;
      }

      .group-head p,
      .group-recommend p,
      .report-card p {
        margin: 10px 0 0;
        line-height: 1.68;
        color: var(--muted);
      }

      .group-recommend {
        padding: 18px;
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(23, 56, 67, 0.96), rgba(27, 76, 91, 0.96));
        color: #f7fbfc;
      }

      .group-recommend span {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .group-recommend strong {
        display: block;
        margin-top: 12px;
        font-size: 24px;
        letter-spacing: -0.03em;
      }

      .group-recommend p {
        color: rgba(247, 251, 252, 0.78);
      }

      .group-rule {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(23, 104, 123, 0.08);
        color: var(--accent-strong);
        font-weight: 700;
        line-height: 1.6;
      }

      .group-fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 16px;
      }

      .field-panel {
        padding: 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid var(--border);
      }

      .field-panel.muted {
        background: rgba(22, 48, 58, 0.04);
      }

      .field-panel h3 {
        margin: 0 0 10px;
        font-size: 14px;
        letter-spacing: 0.02em;
      }

      .field-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .field-chips span {
        display: inline-flex;
        align-items: center;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(19, 73, 87, 0.08);
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
      }

      .candidate-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-top: 20px;
      }

      .candidate-card {
        display: grid;
        gap: 14px;
        padding: 18px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--border);
        box-shadow: 0 10px 26px rgba(16, 49, 59, 0.06);
      }

      .candidate-card.is-recommended {
        border-color: rgba(45, 147, 96, 0.36);
        box-shadow: 0 16px 32px rgba(45, 147, 96, 0.12);
      }

      .candidate-head {
        display: grid;
        gap: 12px;
      }

      .candidate-code {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .candidate-head h3 {
        margin: 4px 0 0;
        font-size: 24px;
        letter-spacing: -0.04em;
      }

      .candidate-head p {
        margin: 8px 0 0;
        line-height: 1.6;
        color: var(--muted);
      }

      .candidate-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .candidate-tags span {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(19, 73, 87, 0.08);
        color: var(--text);
        font-size: 12px;
        font-weight: 800;
      }

      .candidate-tags .tag-recommend {
        background: var(--success-soft);
        color: var(--success);
      }

      .candidate-preview-wrap {
        padding: 14px;
        border-radius: 20px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(243, 236, 223, 0.92)),
          linear-gradient(90deg, rgba(27, 103, 122, 0.05), transparent);
        border: 1px solid rgba(19, 73, 87, 0.08);
      }

      .label-preview {
        position: relative;
        width: 100%;
        aspect-ratio: 3 / 2;
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(19, 73, 87, 0.14);
        background: var(--panel-strong);
        box-shadow: inset 0 0 0 1px rgba(19, 73, 87, 0.04);
      }

      .label-block {
        position: absolute;
      }

      .block-text {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        line-height: 1.05;
        white-space: pre-wrap;
        overflow: hidden;
      }

      .block-text[style*="text-align:center"] {
        justify-content: center;
      }

      .block-text[style*="text-align:right"] {
        justify-content: flex-end;
      }

      .block-qr,
      .block-barcode {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .block-qr svg,
      .block-barcode svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .block-line {
        border-radius: 999px;
      }

      .candidate-meta {
        display: grid;
        gap: 8px;
      }

      .candidate-meta-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(19, 73, 87, 0.05);
        font-size: 13px;
      }

      .candidate-structure {
        border-top: 1px dashed rgba(19, 73, 87, 0.2);
        padding-top: 12px;
      }

      .candidate-structure summary {
        cursor: pointer;
        font-weight: 800;
      }

      .candidate-structure pre {
        margin: 12px 0 0;
        padding: 14px;
        border-radius: 16px;
        background: #122c36;
        color: #e7f3f6;
        font-size: 12px;
        line-height: 1.6;
        overflow: auto;
      }

      .report-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 16px;
      }

      .report-card {
        padding: 18px;
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(23, 56, 67, 0.96), rgba(27, 76, 91, 0.96));
        color: #f8fbfc;
      }

      .report-card span {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .report-card strong {
        display: block;
        margin-top: 12px;
        font-size: 24px;
        letter-spacing: -0.04em;
      }

      .report-card p {
        color: rgba(248, 251, 252, 0.78);
      }

      .loading-shell {
        padding: 60px 24px;
        border-radius: 24px;
        background: var(--panel);
        border: 1px solid var(--border);
        text-align: center;
        font-size: 18px;
        color: var(--muted);
      }

      @media (max-width: 1180px) {
        .candidate-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .group-head {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 820px) {
        #hardwareLabelLab {
          width: min(100vw - 18px, 100%);
          margin: 10px auto 28px;
        }

        .hero,
        .group-section,
        .report-section {
          padding: 18px;
          border-radius: 22px;
        }

        .hero-strip,
        .lab-toolbar,
        .group-fields,
        .report-grid,
        .candidate-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="hardwareLabelLab">
      <div class="loading-shell">正在生成 wait labels 60x40 标签测试页...</div>
    </div>
    <script src="./hardware-label-gallery.js?v=20260423-0535"></script>
  </body>
</html>
